function App(){
const [screen,setScreen]=useState("home");
const [planId,setPlanId]=useState(null);
const [dayIdx,setDayIdx]=useState(0);
const [notes,setNotes]=useState({});
const [completed,setCompleted]=useState({});
const [noteCtx,setNoteCtx]=useState(null);
const [noteText,setNoteText]=useState("");
const [saving,setSaving]=useState(false);

useEffect(()=>{
try{const r=localStorage.getItem("wk-notes");if(r)setNotes(JSON.parse(r));}catch(e){}
try{const r=localStorage.getItem("wk-completed");if(r)setCompleted(JSON.parse(r));}catch(e){}
},[]);

const plan=PLANS.find(p=>p.id===planId);

function toggleExercise(pid,did,eid){
const key=`${pid}:${did}:${eid}`;
const c={...completed};
c[key]=!c[key];
setCompleted(c);
localStorage.setItem("wk-completed",JSON.stringify(c));
}

function finalizarTreino(){
if(confirm("Finalizar treino e desmarcar todos os exercícios?")){
const c={...completed};
plan.days[dayIdx].ex.forEach(ex=>{
delete c[`${plan.id}:${plan.days[dayIdx].id}:${ex.id}`];
});
setCompleted(c);
localStorage.setItem("wk-completed",JSON.stringify(c));
}
}

function openNote(pid,did,eid,name,desc){
const key=`${pid}:${did}:${eid}`;
const parseSeriesFromDescription=(desc)=>{
const aquecMatch=desc.match(/Aquec:\s*([0-9\-]+)(?:×|\s|$)/);
const ajusteMatch=desc.match(/Ajuste:\s*([0-9\-]+)(?:×|\s|$)/);
const trabalhoMatch=desc.match(/Trabalho:\s*([0-9\-]+)(?:×|\s|$)/);
const getCount=(match)=>{
if(!match)return 0;
const nums=match[1].match(/\d+/g);
if(!nums)return 0;
return Math.max(...nums.map(Number));
};
return {aquecCount:getCount(aquecMatch),ajusteCount:getCount(ajusteMatch),trabalhoCount:getCount(trabalhoMatch)};
};
if(!notes[key]){
const series=parseSeriesFromDescription(desc);
const newNote={
aquec:Array(series.aquecCount).fill(null).map(()=>({reps:"",peso:""})),
ajuste:Array(series.ajusteCount).fill(null).map(()=>({reps:"",peso:""})),
trabalho:Array(series.trabalhoCount).fill(null).map(()=>({reps:"",peso:""})),
obs:""
};
setNotes(prev=>({...prev,[key]:newNote}));
}
setNoteCtx({key,name,desc,series:parseSeriesFromDescription(desc)});
setScreen("note");
}

async function saveNote(){
setSaving(true);
const noteData={aquec:[],ajuste:[],trabalho:[],obs:document.querySelector(".note-obs")?.value||""};
const types=["aquec","ajuste","trabalho"];
types.forEach(type=>{
let i=0;
while(document.getElementById(`${type}-reps-${i}`)){
const reps=document.getElementById(`${type}-reps-${i}`)?.value||"";
const peso=document.getElementById(`${type}-peso-${i}`)?.value||"";
if(reps||peso)noteData[type].push({reps,peso});
i++;
}
});
const n={...notes,[noteCtx.key]:noteData};
const exerciseName=noteCtx.name;
PLANS.forEach(plan=>{
plan.days.forEach(day=>{
day.ex.forEach(ex=>{
if(ex.n===exerciseName){
const key=`${plan.id}:${day.id}:${ex.id}`;
n[key]=noteData;
}
});
});
});
setNotes(n);
try{localStorage.setItem("wk-notes",JSON.stringify(n));}catch(e){}
setSaving(false);
setScreen("plan");
}

function clearNote(){
const n={...notes};
const exerciseName=noteCtx.name;
PLANS.forEach(plan=>{
plan.days.forEach(day=>{
day.ex.forEach(ex=>{
if(ex.n===exerciseName){
const key=`${plan.id}:${day.id}:${ex.id}`;
delete n[key];
}
});
});
});
setNotes(n);
localStorage.setItem("wk-notes",JSON.stringify(n));
setScreen("plan");
}

if(screen==="home") return React.createElement("div",{className:"wrapper"},
React.createElement("div",{className:"header-home"},
React.createElement("div",{className:"header-title-home"},"TREINO PRO 🔥")
),
React.createElement("div",{className:"plans-list"},
PLANS.map(p=>
React.createElement("div",{key:p.id,className:"plan-card",onClick:()=>{setPlanId(p.id);setDayIdx(0);setScreen("plan");}},
React.createElement("div",{className:"plan-icon"},p.icon),
React.createElement("div",{className:"plan-info"},
React.createElement("div",{className:"plan-name"},p.name),
React.createElement("div",{className:"plan-sub"},p.sub),
React.createElement("span",{className:"plan-freq"},p.freq)
),
React.createElement("div",{className:"plan-arrow"},"›")
)
)
));

if(screen==="plan"&&plan){
const day=plan.days[dayIdx];
return React.createElement("div",{className:"wrapper"},
React.createElement("div",{className:"header-plan"},
React.createElement("button",{className:"back-btn",onClick:()=>setScreen("home")},"‹"),

),

),

return React.createElement("button",{key:d.id,className:`tab ${active?"tab-active":""}`,onClick:()=>setDayIdx(i)},
d.label
);
})
),
React.createElement("div",{className:"day-content"},
React.createElement("div",{className:"day-header"},
React.createElement("div",{className:"day-title"},day.title),
React.createElement("div",{className:"day-muscles"},day.muscles)
),
day.ex.map((ex,i)=>{
const key=`${plan.id}:${day.id}:${ex.id}`;
const hasNote=!!notes[key];
const isCompleted=!!completed[key];
return React.createElement("div",{key:ex.id,className:`exercise-item ${isCompleted?"completed":""}`},
React.createElement("input",{type:"checkbox",className:"ex-checkbox",checked:isCompleted,onChange:()=>toggleExercise(plan.id,day.id,ex.id)}),

React.createElement("div",{className:"ex-desc"},ex.d)

"📝"

);
}),

const renderSeriesSection=(title,type,count,icon)=>{

return React.createElement("div",{className:"wrapper"},
